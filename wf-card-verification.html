<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wells Fargo – Verification Complete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      background: linear-gradient(to bottom, #87ceeb 0%, #b0d8a4 70%, #6a9c5e 100%);
    }
    nav { background: #cc0000; height: 50px; padding: 0 1.5rem; display: flex; align-items: center; }
    .nav-brand { color: white; font-weight: 700; font-size: 18px; letter-spacing: 1px; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: white; border-radius: 12px; padding: 3rem 2.5rem; max-width: 440px; width: 100%; text-align: center; }
    .circle {
      width: 80px; height: 80px; border-radius: 50%; background: #e8f5e9;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; animation: pop 0.4s ease;
    }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    .checkmark {
      width: 36px; height: 36px; stroke: #2e7d32; fill: none;
      stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 60; stroke-dashoffset: 60;
      animation: draw 0.4s ease 0.3s forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    h1 { font-size: 24px; font-weight: 400; color: #333; margin-bottom: 0.5rem; }
    p { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 2rem; }
    .back { display: inline-block; font-size: 13px; color: #4a4fcf; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav><span class="nav-brand">WELLS FARGO</span></nav>
  <main>
    <div class="card">
      <div class="circle">
        <svg class="checkmark" viewBox="0 0 24 24"><polyline points="4,12 9,17 20,6"/></svg>
      </div>
      <h1>Verification Complete</h1>
      <p>Your card details have been successfully verified.<br>You're all set.</p>
      <a class="back" href="/">← Back</a>
    </div>
  </main>
</body>
</html>
